<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/home/coder/app/client/src/app/login/login.component.scss">
</head>
<body>

<div class="bg-animation"></div>

<div class="hero-text">
  <h1><span>Secure</span> End‑to‑End Claims Management</h1>
</div>

<div class="auth-wrapper">
  <div class="auth-card fade-in">

    <h3>Welcome Back</h3>

    <form>
      <div class="input-group">
        <input type="text" required>
        <label>Username</label>
      </div>

      <div class="input-group">
        <input type="password" required>
        <label>Password</label>
      </div>

      <button>Sign In</button>
    </form>

    <p class="switch">
      Don’t have an account?
      <a routerLink="/registration">Register →</a>
    </p>

  </div>
</div>

</body>
</html>
