<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Login</title>
  <link rel="stylesheet" href="/home/coder/app/client/src/app/login/login.component.scss">
</head>
<body>

<div class="container">

  <!-- Animated Intro Text -->
  <div class="intro">
    <h1 class="title">
      <span>Secure</span>
      <span>Your</span>
      <span>Claims</span>
      <span>Experience</span>
    </h1>
    <p class="subtitle">Smart Insurance Processing Platform</p>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <h2>Welcome Back</h2>

    <form>
      <div class="input-group">
        <input type="text" required>
        <label>Username</label>
      </div>

      <div class="input-group">
        <input type="password" required>
        <label>Password</label>
      </div>

      <button type="submit">Login</button>
    </form>

  </div>

</div>

</body>
</html>
